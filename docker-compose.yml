services:
  education-agent:
    build: .
    container_name: education-agent
    restart: unless-stopped
    ports:
      - "${PORT:-5107}:5107"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5107
      SESSION_SECRET: ${SESSION_SECRET:?please-set-session-secret-in-env}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      MAX_UPLOAD_SIZE_BYTES: ${MAX_UPLOAD_SIZE_BYTES:-3221225472}
      AI_PDF_AGENT_TIMEOUT_MS: ${AI_PDF_AGENT_TIMEOUT_MS:-480000}
      PDF_AGENT_TIMEOUT_MS: ${PDF_AGENT_TIMEOUT_MS:-1200000}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
